<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
    <link rel="stylesheet" href="./calc.css">

    <body>
        <div class="container">
            <div class="body">
            
                <div class="top-row">
                    <button id="clear">C</button>
                    <button id="delete">DEL</button>
                    <button id="answer-box" > </button>
                </div>

                <div class="num-r1">
                    <button id="a">1</button>
                    <button id="b">2</button>
                    <button id="c">3</button>
                </div>
                <div class="num-r2">
                    <button id="d">4</button>
                    <button id="e">5</button>
                    <button id="f">6</button>
                </div>
                    <div class="num-r3">
                    <button id="g">7</button>
                    <button id="h">8</button>
                    <button id="i">9</button>
                </div>
                <div class="num-r4">
                    <button id="j">0</button>
                    <button id="k">.</button>
                    <button id="p">%</button>
                    <button id="eq">=</button>
                </div>
                <div class="symbols">
                    <button id="plus">+</button>
                    <button id="minus">-</button>
                    <button id="multiply">*</button>
                    <button id="divide">/</button>
                </div>
            </div>
        </div>
        <script src="./calc.js"></script>
    </body>
</html>
